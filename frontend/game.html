<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="nav-bar">
  <button onclick="window.location.href='lobby.html'">← Back to Lobby</button>
</nav>
<h2 id="gameTitle">Game</h2>
<h3>Room: <span id="roomCode"></span> | Game: <span id="gameType"></span></h3>

<div id="scoreboard"></div>

<div id="gameContainer"></div>

<h3 id="status">Loading...</h3>

<script src="/socket.io/socket.io.js"></script>
<script src="games.js"></script>
<script>
const socket = io();
let room = localStorage.getItem('room');
let gameType = localStorage.getItem('game') || 'reaction';

document.getElementById('roomCode').innerText = room;
document.getElementById('gameType').innerText = gameType;
document.getElementById('gameTitle').innerText = gameType.charAt(0).toUpperCase() + gameType.replace('tictactoe','Tic Tac Toe').replace('wordchain','Word Chain').slice(1) + ' Battle';

let playerName = localStorage.getItem('playerName') || 'Anonymous';

initGameUI(gameType);

setupGameListeners();

socket.emit('joinRoom', {room, playerName});

socket.on('updatePlayers', players => {
  updateScoreboard(players.reduce((acc, p) => ({...acc, [p.name]: p.score || 0}), {}));
});
</script>

</body>
</html>
