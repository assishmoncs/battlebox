<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lobby – BattleBox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="nav-bar">
  <span class="nav-brand">⚔️ BattleBox</span>
  <button onclick="window.location.href='index.html'">🏠 Home</button>
</nav>

<h2>Lobby</h2>

<div style="display:flex; align-items:center; justify-content:center; gap:0.75rem; flex-wrap:wrap; margin-bottom:0.5rem;">
  <div class="room-code-display">
    <span id="roomCode">—</span>
    <button class="btn-copy" onclick="copyRoomCode()" title="Copy room code">📋</button>
  </div>
  <span class="game-badge" id="gameTypeBadge">⏳ Loading…</span>
</div>

<p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:1rem;">
  Share the room code with friends to invite them
</p>

<div id="scoreboard"></div>

<div style="max-width:480px; margin:0 auto;">
  <h3 style="text-align:left; padding:0 0.25rem;">Players</h3>
  <ul id="playerList"></ul>
</div>

<div style="margin-top:1.25rem;">
  <button id="startBtn" onclick="startGame()" class="btn-success" style="display:none;">
    ▶ Start Game
  </button>
  <p id="waitMsg" style="color:var(--text-muted); font-size:0.88rem; margin-top:0.5rem; display:none;">
    Waiting for the host to start…
  </p>
  <p id="minPlayersMsg" style="color:var(--text-muted); font-size:0.82rem; margin-top:0.4rem; display:none;">
    Need at least 2 players to start
  </p>
</div>

<div id="toast-container" role="status" aria-live="polite"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="games.js"></script>
<script>
const socket = io();

const room = localStorage.getItem('room');
const playerName = localStorage.getItem('playerName') || 'Anonymous';
const isCreator = localStorage.getItem('isCreator') === '1';
localStorage.removeItem('isCreator');

let gameType = localStorage.getItem('game');
let hostId = null;
let isHost = false;
let allPlayers = [];

const GAME_ICONS  = { reaction: '⚡', tictactoe: '🎯', wordchain: '💬' };
const GAME_LABELS = { reaction: 'Reaction Battle', tictactoe: 'Tic Tac Toe', wordchain: 'Word Chain' };

document.getElementById('roomCode').innerText = room || '—';
setGameBadge(gameType);

function setGameBadge(game) {
  const badge = document.getElementById('gameTypeBadge');
  if (badge && game) {
    badge.textContent = `${GAME_ICONS[game] || '🎮'} ${GAME_LABELS[game] || game}`;
  }
}

function copyRoomCode() {
  const code = document.getElementById('roomCode').innerText;
  if (!code || code === '—') return;
  navigator.clipboard.writeText(code).then(() => {
    showToast('Room code copied!', 'success', 1800);
  }).catch(() => {
    showToast('Code: ' + code, 'info', 3000);
  });
}

function updateStartButton() {
  const startBtn = document.getElementById('startBtn');
  const waitMsg  = document.getElementById('waitMsg');
  const minMsg   = document.getElementById('minPlayersMsg');
  if (isHost) {
    startBtn.style.display = 'inline-flex';
    waitMsg.style.display  = 'none';
    minMsg.style.display   = allPlayers.length < 2 ? 'block' : 'none';
    startBtn.disabled      = allPlayers.length < 2;
  } else {
    startBtn.style.display = 'none';
    waitMsg.style.display  = 'block';
    minMsg.style.display   = 'none';
  }
}

function renderPlayerList(players) {
  allPlayers = players;
  const list = document.getElementById('playerList');
  list.innerHTML = '';
  players.forEach(p => {
    const li = document.createElement('li');
    const isCurrentHost = hostId && p.id === hostId;
    const initials = (p.name || '?').substring(0, 2).toUpperCase();
    li.innerHTML = `
      <div class="player-avatar">${initials}</div>
      <div class="player-info">
        <div class="player-name">${escapeHtml(p.name)}${isCurrentHost ? ' <span class="player-badge">👑 Host</span>' : ''}</div>
        <div class="player-score-label">Score: ${p.score || 0}</div>
      </div>
    `;
    list.appendChild(li);
  });
  updateScoreboard(players.reduce((acc, p) => ({ ...acc, [p.name]: p.score || 0 }), {}));
  updateStartButton();
}

function startGame() {
  if (!isHost) return;
  if (allPlayers.length < 2) {
    showToast('Need at least 2 players to start!', 'warning');
    return;
  }
  socket.emit('startGame', room);
}

// ===== Socket events =====

let initialConnectDone = false;

socket.on('connect', () => {
  if (!room) {
    showToast('No room found. Redirecting…', 'error');
    setTimeout(() => window.location.href = 'index.html', 1500);
    return;
  }
  if (!initialConnectDone && isCreator) {
    initialConnectDone = true;
    socket.emit('createRoom', { room, game: gameType, playerName }, (res) => {
      if (!res || !res.ok) {
        showToast((res && res.error) || 'Failed to create room.', 'error');
        setTimeout(() => window.location.href = 'index.html', 2500);
      }
    });
  } else {
    initialConnectDone = true;
    socket.emit('joinRoom', { room, playerName });
  }
});

socket.on('youAreHost', () => {
  isHost = true;
  updateStartButton();
});

socket.on('roomInfo', ({ game, hostId: serverHostId }) => {
  if (game) {
    gameType = game;
    localStorage.setItem('game', game);
    setGameBadge(game);
  }
  if (serverHostId) hostId = serverHostId;
  isHost = socket.id === hostId;
  updateStartButton();
});

socket.on('updatePlayers', players => {
  renderPlayerList(players);
});

socket.on('gameStarted', () => {
  window.location.href = 'game.html';
});

setupGameListeners();
</script>

</body>
</html>
